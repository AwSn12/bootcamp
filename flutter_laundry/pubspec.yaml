name: flutter_laundry
description: "RAVLaundry - Aplikasi Laundry Online"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP Client
  dio: ^5.8.0+1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.3

  # Local Storage
  shared_preferences: ^2.3.3

  # UI & Fonts
  google_fonts: ^6.2.1

  # Charts (Admin Dashboard)
  fl_chart: ^0.69.2

  # Date & Time
  intl: ^0.20.2

  # Image Picker
  image_picker: ^1.1.2

  # Maps (OpenStreetMap - tidak perlu API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS Location (untuk lokasi otomatis kurir)
  geolocator: ^13.0.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
